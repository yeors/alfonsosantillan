<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarjeta de Presentación – Alfonso Santillán</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <!-- QR Code library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <!-- html2canvas: captura la tarjeta como imagen -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- jsPDF: convierte la imagen a PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    /* ============================================================
       CSS VARIABLES – cambia aquí los colores de tu marca
    ============================================================ */
    :root {
      --gold:        #F5C518;
      --gold-dark:   #c9a000;
      --gold-light:  #ffe066;
      --bg-dark:     #1a1a1a;
      --bg-card:     #222222;
      --bg-section:  #2a2a2a;
      --text-light:  #f0f0f0;
      --text-muted:  #aaaaaa;
      --radius:      14px;
      --card-width:  420px;       /* ancho máx. de la tarjeta */
      --shadow:      0 8px 40px rgba(0,0,0,.6);
    }

    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-dark);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 16px 60px;
      font-family: 'Lato', sans-serif;
      color: var(--text-light);
    }

    /* ============================================================
       TARJETA PRINCIPAL
    ============================================================ */
    .card {
      width: 100%;
      max-width: var(--card-width);
      background: var(--bg-card);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      animation: fadeUp .6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── HEADER / BANNER ── */
    .card-header {
      position: relative;
      background: #111;
      padding: 32px 20px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Logo */
    .logo {
      width: 85%;
      max-width: 340px;
      height: auto;
      margin-bottom: 16px;
    }



    .name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 5vw, 1.75rem);
      font-weight: 900;
      color: var(--gold);
      text-align: center;
      letter-spacing: .5px;
    }
    .job-title {
      font-size: .85rem;
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── CONTACT ICONS ── */
    .contact-row {
      display: flex;
      justify-content: center;
      gap: 18px;
      padding: 22px 20px;
      background: var(--bg-section);
    }
    .contact-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: transform .2s, background .2s;
      box-shadow: 0 4px 14px rgba(245,197,24,.35);
    }
    .contact-btn:hover { transform: scale(1.12); background: var(--gold-light); }
    .contact-btn svg { width: 22px; height: 22px; fill: #111; }

    /* ── ACTION BUTTONS ── */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 20px 20px 14px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      background: var(--gold);
      color: #111;
      font-family: 'Lato', sans-serif;
      font-size: .92rem;
      font-weight: 700;
      letter-spacing: .5px;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      transition: background .2s, transform .15s;
    }
    .btn:hover { background: var(--gold-light); transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: rgba(255,255,255,.08);
      margin: 4px 20px;
    }

    /* ── VIDEO ── */
    .section {
      padding: 18px 20px;
    }
    .section-title {
      font-size: .7rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
      font-weight: 700;
    }
    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 */
      height: 0;
      overflow: hidden;
      border-radius: 10px;
      background: #111;
    }
    .video-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 10px;
    }

    /* ── YOUTUBE THUMBNAIL ── */
    .yt-thumb-link {
      display: block;
      text-decoration: none;
    }
    .yt-thumb-wrapper {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      background: #111;
      cursor: pointer;
    }
    .yt-thumb-img {
      width: 100%;
      display: block;
      border-radius: 10px;
      transition: filter .2s;
    }
    .yt-thumb-link:hover .yt-thumb-img {
      filter: brightness(.75);
    }
    .yt-play-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      pointer-events: none;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,.5));
      transition: transform .2s;
    }
    .yt-thumb-link:hover .yt-play-btn {
      transform: translate(-50%, -60%) scale(1.12);
    }
    .yt-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,.65);
      color: #fff;
      font-size: .8rem;
      font-weight: 700;
      text-align: center;
      padding: 7px 0;
      letter-spacing: 1px;
      border-radius: 0 0 10px 10px;
    }

    /* ── QR CODE ── */
    .qr-section {
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    #qrcode canvas, #qrcode img {
      border-radius: 8px;
      background: #fff;
      padding: 6px;
    }
    .qr-label {
      font-size: .78rem;
      color: var(--text-muted);
      text-align: center;
    }

    /* ── SOCIAL ── */
    .social-section {
      padding: 22px 20px 28px;
      background: var(--bg-section);
      text-align: center;
    }
    .social-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--gold);
      letter-spacing: 1px;
      margin-bottom: 16px;
    }
    .social-row {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    .social-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: transform .2s, background .2s;
      box-shadow: 0 4px 14px rgba(245,197,24,.3);
    }
    .social-btn:hover { transform: scale(1.13); background: var(--gold-light); }
    .social-btn svg { width: 22px; height: 22px; fill: #111; }

    /* ── FOOTER CTA ── */
    .footer-cta {
      padding: 22px 24px 28px;
      text-align: center;
    }
    .footer-cta p {
      font-size: .85rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .footer-cta a.btn-wa {
      display: inline-block;
      padding: 11px 28px;
      border-radius: 8px;
      background: #25D366;
      color: #fff;
      font-weight: 700;
      font-size: .88rem;
      text-decoration: none;
      transition: background .2s, transform .15s;
    }
    .footer-cta a.btn-wa:hover { background: #1ebe5b; transform: translateY(-2px); }

    /* ============================================================
       RESPONSIVE TWEAKS
    ============================================================ */
    @media (min-width: 500px) {
      body { padding: 40px 20px 80px; }
    }
  </style>
</head>

<script>
  /* ── 1. DATOS DE LA VCARD ───────────────────────────────────
     Edita aquí TODOS los datos del contacto.
     Los campos opcionales pueden quedar vacíos ("").
  ─────────────────────────────────────────────────────────── */
  const vCardData = {
    nombre:       "Alfonso",
    apellidos:    "Santillán Ballesteros",
    empresa:      "CriArt Music",
    titulo:       "Intérprete (Cantante)",
    telefono:     "+523320527425",
    whatsapp:     "+523320527425",
    email:        "correo@ejemplo.com",
    sitioWeb:     "https://alfonsosantillan.vercel.app",
    facebook:     "https://www.facebook.com/crartmusic",
    instagram:    "https://instagram.com/tuperfil",
    tiktok:       "https://tiktok.com/@tuperfil",
    youtube:      "https://youtube.com/@tucanal",
    nota:         "Intérprete (Cantante) – CriArt Music"
  };

  const QR_URL = "https://alfonsosantillan.vercel.app";


  /* ══════════════════════════════════════════════════════════
     NO EDITES DEBAJO DE ESTA LÍNEA (a menos que sepas JS)
  ══════════════════════════════════════════════════════════ */

  /* Generar QR */
  window.addEventListener('DOMContentLoaded', () => {
    new QRCode(document.getElementById("qrcode"), {
      text: QR_URL,
      width: 160,
      height: 160,
      colorDark: "#111111",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  });

  /* Descargar vCard */
  function descargarVCard() {
    const v = vCardData;
    const vcf = [
      "BEGIN:VCARD",
      "VERSION:3.0",
      `N:${v.apellidos};${v.nombre};;;`,
      `FN:${v.nombre} ${v.apellidos}`,
      v.empresa  ? `ORG:${v.empresa}`          : "",
      v.titulo   ? `TITLE:${v.titulo}`          : "",
      v.telefono ? `TEL;TYPE=CELL:${v.telefono}`: "",
      v.email    ? `EMAIL:${v.email}`           : "",
      v.sitioWeb ? `URL:${v.sitioWeb}`          : "",
      v.nota     ? `NOTE:${v.nota}`             : "",
      "END:VCARD"
    ].filter(Boolean).join("\r\n");

    const blob = new Blob([vcf], { type: "text/vcard;charset=utf-8" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = `${v.nombre}_${v.apellidos}.vcf`;
    a.click();
    URL.revokeObjectURL(url);
  }

  /* ── Helper: captura la tarjeta como canvas ── */
  async function capturarTarjeta() {
    const card = document.querySelector('.card');
    return await html2canvas(card, {
      scale: 2,              // alta resolución
      useCORS: true,         // permite imágenes externas (logo, avatar)
      backgroundColor: null, // respeta el fondo de la tarjeta
      logging: false
    });
  }

  /* ── Descargar como PDF ── */
  async function descargarPDF() {
    const btn = event.currentTarget;
    btn.textContent = '⏳ Generando PDF…';
    btn.disabled = true;
    try {
      const canvas = await capturarTarjeta();
      const imgData = canvas.toDataURL('image/jpeg', 0.95);
      const { jsPDF } = window.jspdf;
      // Dimensiones en mm proporcionales al canvas
      const pxToMm = 0.264583;
      const w = canvas.width  * pxToMm / 2;   // /2 por el scale:2
      const h = canvas.height * pxToMm / 2;
      const pdf = new jsPDF({ orientation: h > w ? 'p' : 'l', unit: 'mm', format: [w, h] });
      pdf.addImage(imgData, 'JPEG', 0, 0, w, h);
      pdf.save('Alfonso_Santillan_Tarjeta.pdf');
    } catch (e) {
      alert('No se pudo generar el PDF. Intenta de nuevo.');
      console.error(e);
    } finally {
      btn.textContent = '⬇ Descargar tarjeta (PDF)';
      btn.disabled = false;
    }
  }

  /* ── Descargar como PNG ── */
  async function descargarPNG() {
    const btn = event.currentTarget;
    btn.textContent = '⏳ Generando imagen…';
    btn.disabled = true;
    try {
      const canvas = await capturarTarjeta();
      const link = document.createElement('a');
      link.download = 'Alfonso_Santillan_Tarjeta.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch (e) {
      alert('No se pudo generar la imagen. Intenta de nuevo.');
      console.error(e);
    } finally {
      btn.textContent = '⬇ Descargar tarjeta (.png)';
      btn.disabled = false;
    }
  }

  /* Web Share */
  async function compartir() {
    const shareData = {
      title: `${vCardData.nombre} ${vCardData.apellidos}`,
      text:  `${vCardData.titulo} – ${vCardData.empresa}`,
      url:   QR_URL
    };
    if (navigator.share) {
      try { await navigator.share(shareData); }
      catch (e) { console.warn("Share cancelado:", e); }
    } else {
      await navigator.clipboard.writeText(QR_URL);
      alert("Enlace copiado al portapapeles: " + QR_URL);
    }
  }
</script>
